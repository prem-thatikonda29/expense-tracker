<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Set Budget</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom styles to hide scrollbar for clean mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Custom caret color for input */
        .caret-primary {
            caret-color: #137fec;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 font-display min-h-screen flex justify-center items-center p-0 sm:p-4">
<!-- Mobile Container -->
<div class="w-full max-w-md bg-white dark:bg-[#15202b] sm:rounded-[2rem] h-[100dvh] sm:h-[850px] flex flex-col relative shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800">
<!-- Progress Bar Top -->
<div class="px-6 pt-12 pb-4 w-full">
<div class="flex justify-between items-center mb-2">
<span class="text-xs font-bold text-primary tracking-wider uppercase">Step 1 of 3</span>
<span class="text-xs font-medium text-slate-400 dark:text-slate-500">Skip</span>
</div>
<div class="h-1.5 w-full bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary rounded-full"></div>
</div>
</div>
<!-- Main Content Area -->
<div class="flex-1 px-6 flex flex-col items-center pt-8">
<!-- Icon / Visual Aid -->
<div class="w-20 h-20 rounded-2xl bg-primary/10 flex items-center justify-center mb-8 relative">
<span class="material-icons-round text-4xl text-primary">savings</span>
<!-- Abstract decorative blobs -->
<div class="absolute -top-2 -right-2 w-6 h-6 bg-yellow-400 rounded-full opacity-80 blur-[1px]"></div>
<div class="absolute -bottom-1 -left-1 w-4 h-4 bg-teal-400 rounded-full opacity-80 blur-[1px]"></div>
</div>
<!-- Headers -->
<div class="text-center w-full max-w-xs mx-auto mb-10">
<h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-3 leading-tight">
                    Set Your Monthly <br/><span class="text-primary">Budget</span>
</h1>
<p class="text-slate-500 dark:text-slate-400 leading-relaxed text-sm">
                    Tracking starts with a goal. How much do you want to spend this month? You can change this later.
                </p>
</div>
<!-- Input Section -->
<div class="w-full relative group">
<label class="block text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest text-center mb-4" for="budget-input">
                    Monthly Limit (₹)
                </label>
<div class="relative flex items-center justify-center">
<!-- Currency Symbol -->
<span class="text-4xl sm:text-5xl font-medium text-slate-300 dark:text-slate-600 mr-2 absolute left-4 sm:left-8 top-1/2 -translate-y-1/2 select-none pointer-events-none">₹</span>
<!-- Input Field -->
<input autofocus="" class="w-full bg-transparent border-2 border-slate-200 dark:border-slate-700 rounded-2xl text-center text-4xl sm:text-5xl font-bold text-slate-900 dark:text-white py-8 px-10 focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all caret-primary placeholder-slate-200 dark:placeholder-slate-700" id="budget-input" inputmode="numeric" pattern="[0-9]*" placeholder="5,000" type="text"/>
<!-- Clear Button (Conditional appearance usually, static here for UI) -->
<button class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 dark:hover:text-slate-400 transition-colors">
<span class="material-icons-round text-2xl">close</span>
</button>
</div>
<!-- Helper message -->
<p class="text-center text-xs text-slate-400 mt-3 font-medium flex items-center justify-center gap-1">
<span class="material-icons-round text-sm">lock</span> Private to you
                </p>
</div>
<div class="flex-grow"></div> <!-- Spacer to push buttons down -->
<!-- Suggested Amounts (Quick Chips) -->
<div class="w-full grid grid-cols-3 gap-3 mb-8">
<button class="py-2.5 px-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-600 dark:text-slate-300 text-sm font-semibold hover:border-primary hover:text-primary transition-all">
                    ₹ 3k
                </button>
<button class="py-2.5 px-2 rounded-xl border-2 border-primary bg-primary/5 text-primary text-sm font-semibold shadow-sm transition-all">
                    ₹ 5k
                </button>
<button class="py-2.5 px-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-600 dark:text-slate-300 text-sm font-semibold hover:border-primary hover:text-primary transition-all">
                    ₹ 8k
                </button>
</div>
<!-- Bottom Actions -->
<div class="w-full pb-8">
<!-- Primary Button -->
<button class="w-full bg-primary hover:bg-blue-600 active:scale-[0.98] text-white font-bold text-lg py-4 rounded-xl shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center group mb-4">
                    Continue
                    <span class="material-icons-round ml-2 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Secondary Action -->
<button class="w-full py-3 text-slate-500 dark:text-slate-400 font-semibold text-sm hover:text-slate-800 dark:hover:text-white transition-colors">
                    I'll set this later
                </button>
</div>
</div>
<!-- Keyboard Placeholder (Visual simulation for mobile feel) -->
<div class="hidden sm:block absolute bottom-0 w-full h-1 bg-gradient-to-t from-slate-100 dark:from-slate-800 to-transparent pointer-events-none"></div>
</div>
</body></html>
