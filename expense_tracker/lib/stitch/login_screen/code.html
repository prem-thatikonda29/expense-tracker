<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login Screen - Student Finance App</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#137fec",
              "primary-dark": "#0b62b8",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
              "surface-light": "#ffffff",
              "surface-dark": "#1a2632",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
            boxShadow: {
                "soft": "0 10px 40px -10px rgba(19, 127, 236, 0.15)",
                "input": "0 2px 8px rgba(0,0,0,0.02)"
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Mobile Container mimicking an iOS Phone view -->
<div class="w-full max-w-[400px] h-[850px] bg-background-light dark:bg-background-dark rounded-[3rem] border-[8px] border-white dark:border-slate-800 shadow-2xl relative overflow-hidden flex flex-col">
<!-- Status Bar Simulation -->
<div class="h-12 w-full flex justify-between items-center px-6 pt-2 select-none">
<span class="text-sm font-semibold">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-icons-round text-sm">signal_cellular_alt</span>
<span class="material-icons-round text-sm">wifi</span>
<span class="material-icons-round text-sm">battery_full</span>
</div>
</div>
<!-- AppBar -->
<header class="h-14 px-4 flex items-center justify-between relative z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-icons-round">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold absolute left-1/2 transform -translate-x-1/2">Login</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 pt-8 pb-8 overflow-y-auto">
<!-- Hero / Branding Section -->
<div class="flex-1 flex flex-col items-center justify-center mb-8">
<div class="w-24 h-24 bg-gradient-to-br from-primary to-blue-400 rounded-2xl flex items-center justify-center mb-6 shadow-soft shadow-blue-500/30">
<span class="material-icons-round text-white text-5xl">account_balance_wallet</span>
</div>
<h2 class="text-2xl font-bold text-center text-slate-900 dark:text-white mb-2">Welcome Back</h2>
<p class="text-slate-500 dark:text-slate-400 text-center text-sm max-w-[260px]">Manage your student expenses easily and keep track of your daily spendings.</p>
</div>
<!-- Login Form -->
<form class="space-y-5 w-full">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 group-focus-within:text-primary transition-colors text-xl">alternate_email</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-white dark:bg-surface-dark border-2 border-transparent focus:border-primary/50 hover:border-slate-200 dark:hover:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:ring-0 focus:outline-none shadow-input transition-all duration-200 ease-out" id="email" name="email" placeholder="student@university.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 group-focus-within:text-primary transition-colors text-xl">lock_outline</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-white dark:bg-surface-dark border-2 border-transparent focus:border-primary/50 hover:border-slate-200 dark:hover:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:ring-0 focus:outline-none shadow-input transition-all duration-200 ease-out" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
<span class="material-icons-round text-xl">visibility_off</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="text-xs font-semibold text-primary hover:text-primary-dark dark:hover:text-blue-400 transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<!-- Spacer -->
<div class="h-4"></div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group" type="button">
<span>Login</span>
<span class="material-icons-round text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Bottom Action -->
<div class="mt-auto pt-8 pb-4 flex flex-col items-center gap-4">
<div class="flex items-center gap-4 w-full px-4">
<div class="h-px bg-slate-200 dark:bg-slate-700 flex-1"></div>
<span class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Or</span>
<div class="h-px bg-slate-200 dark:bg-slate-700 flex-1"></div>
</div>
<div class="flex flex-row items-center gap-2 text-sm">
<span class="text-slate-500 dark:text-slate-400">Don't have an account?</span>
<button class="font-bold text-primary hover:text-primary-dark dark:hover:text-blue-400 px-2 py-1 -mr-2 rounded-lg hover:bg-primary/5 transition-colors">
                        Create an account
                    </button>
</div>
</div>
</main>
<!-- Home Indicator (iOS) -->
<div class="h-1 w-32 bg-slate-300 dark:bg-slate-600 rounded-full mx-auto mb-2 opacity-50"></div>
</div>
</body></html>
