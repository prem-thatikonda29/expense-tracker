<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Signup - Personal Finance App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-100 min-h-screen flex justify-center items-center">
<!-- Mobile Container -->
<div class="w-full max-w-md h-screen max-h-[900px] bg-white dark:bg-slate-900 shadow-2xl overflow-hidden relative flex flex-col sm:rounded-xl sm:h-[85vh] sm:border sm:border-slate-200 dark:sm:border-slate-800">
<!-- Status Bar Placeholder (iOS Safe Area) -->
<div class="h-12 w-full bg-white dark:bg-slate-900 shrink-0"></div>
<!-- AppBar -->
<header class="px-4 py-3 flex items-center justify-between bg-white dark:bg-slate-900 z-10 sticky top-0">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-300">
<span class="material-icons">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Signup</h1>
</div>
<!-- Optional Help/Info Icon -->
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-400">
<span class="material-icons text-[20px]">help_outline</span>
</button>
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 overflow-y-auto no-scrollbar px-4 pt-4 pb-8 flex flex-col">
<!-- Hero / Branding Area -->
<div class="mb-8 flex flex-col items-center text-center">
<div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-4 text-primary">
<span class="material-icons text-4xl">account_balance_wallet</span>
</div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Create Account</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Start tracking your daily expenses today.</p>
</div>
<!-- Form Fields -->
<form action="#" class="space-y-5 flex-1" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons text-slate-400 group-focus-within:text-primary transition-colors text-[20px]">email</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-200 dark:border-slate-700 rounded-lg leading-5 bg-slate-50 dark:bg-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary sm:text-sm transition duration-150 ease-in-out dark:text-white" id="email" name="email" placeholder="student@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons text-slate-400 group-focus-within:text-primary transition-colors text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-slate-200 dark:border-slate-700 rounded-lg leading-5 bg-slate-50 dark:bg-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary sm:text-sm transition duration-150 ease-in-out dark:text-white" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-icons text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 text-[20px]">visibility_off</span>
</div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="confirm_password">Confirm Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons text-slate-400 group-focus-within:text-primary transition-colors text-[20px]">lock_reset</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-slate-200 dark:border-slate-700 rounded-lg leading-5 bg-slate-50 dark:bg-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary sm:text-sm transition duration-150 ease-in-out dark:text-white" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-icons text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 text-[20px]">visibility_off</span>
</div>
</div>
<p class="text-xs text-slate-500 dark:text-slate-500 ml-1 pt-1">Must be at least 8 characters.</p>
</div>
</form>
<!-- Bottom Actions -->
<div class="mt-8 space-y-4">
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all active:scale-[0.98]" type="button">
                    Sign Up
                </button>
<div class="text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                        Already have an account? 
                        <a class="font-bold text-primary hover:text-primary/80 transition-colors ml-1" href="#">
                            Login instead
                        </a>
</p>
</div>
<!-- Social Signup Divider (Optional Enhancement for Modern Feel) -->
<div class="relative mt-6">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white dark:bg-slate-900 text-slate-400 text-xs uppercase tracking-wide">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-3 mt-4">
<button class="flex items-center justify-center px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors bg-white dark:bg-slate-900">
<!-- Google Icon placeholder -->
<svg class="h-5 w-5 mr-2" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Google</span>
</button>
<button class="flex items-center justify-center px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors bg-white dark:bg-slate-900">
<span class="material-icons text-slate-800 dark:text-white mr-2 text-[20px]">apple</span>
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Apple</span>
</button>
</div>
</div>
<!-- Bottom safe area spacing -->
<div class="h-6"></div>
</main>
<!-- iOS Home Indicator Safe Area -->
<div class="h-1 w-32 bg-slate-900/20 dark:bg-white/20 rounded-full mx-auto mb-2 shrink-0"></div>
</div>
</body></html>
